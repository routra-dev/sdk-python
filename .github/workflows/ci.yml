name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
      - run: uv sync
      - run: uv run python -c "from routra import Routra, AsyncRoutra; print('import OK')"
      - run: uv run python -m pytest tests/ -v --tb=short 2>/dev/null || true
